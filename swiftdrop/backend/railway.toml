# SwiftDrop Backend - Railway.app config
# Place this service's root directory at: swiftdrop/backend (monorepo)

[build]
builder = "nixpacks"

[deploy]
preDeployCommand = ["npm run db:migrate", "npm run db:ensure-admin"]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
