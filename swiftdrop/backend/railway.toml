# SwiftDrop Backend - Railway.app config
# Place this service's root directory at: swiftdrop/backend (monorepo)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Railway allows only one preDeployCommand string (not an array). Chain scripts with &&.
preDeployCommand = "npm run db:migrate && npm run db:ensure-admin && npm run db:ensure-test-users"
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
